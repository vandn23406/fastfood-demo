<header class="site-header">
    <div class="header-inner">
        <a href="/home" class="logo-link" aria-label="Logo cửa hàng">
            <img class="logo-image" src="/avatar-logo-removebg-preview.png" alt="Logo cửa hàng" />
        </a>

        <nav class="header-nav" aria-label="Điều hướng chính">
            <a href="/home" class="nav-link">Trang chủ</a>
            <a href="/products" class="nav-link">Thực đơn</a>
            <a href="/combo" class="nav-link">Combo</a>
            <a href="/promotion" class="nav-link">Khuyến mãi</a>
            <a href="/about-us" class="nav-link">Về Box&Bite</a>

        <a href="/cart" class="cart-link" aria-label="Giỏ hàng">
            <i class="bi bi-cart3" aria-hidden="true"></i>
